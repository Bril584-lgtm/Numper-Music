<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Numper Music</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080808; --surface: #121212; --surface2: #181818; --surface3: #282828;
    --border: #333; --text: #fff; --muted: #a7a7a7; --sub: #6a6a6a;
    --accent: #1db954; --accent-dim: rgba(29,185,84,.18); --radius: 8px;
    --bar-h: 90px;
  }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; }

  /* ── NAV ── */
  nav {
    flex-shrink: 0; position: sticky; top: 0; z-index: 100;
    background: rgba(8,8,8,.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: .8rem; padding: .65rem 1.4rem; flex-wrap: wrap;
  }
  .nav-logo { font-weight: 800; font-size: 1.15rem; color: var(--accent); text-decoration: none; flex-shrink: 0; display: flex; align-items: center; gap: .4rem; }
  .nav-logo span { color: var(--text); }
  .search-wrap { position: relative; flex: 1; max-width: 400px; min-width: 160px; }
  #search { width: 100%; background: var(--surface3); border: 1px solid var(--border); border-radius: 999px; padding: .45rem 1rem .45rem 2.4rem; color: var(--text); font-size: .9rem; outline: none; transition: border-color .15s; }
  #search::placeholder { color: var(--muted); }
  #search:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: .8rem; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  #suggestions { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; z-index: 200; display: none; box-shadow: 0 8px 24px rgba(0,0,0,.6); }
  .sug-item { display: flex; align-items: center; gap: .7rem; padding: .55rem .8rem; cursor: pointer; transition: background .1s; }
  .sug-item:hover { background: var(--surface3); }
  .sug-thumb { width: 36px; height: 36px; object-fit: cover; border-radius: 4px; background: var(--surface3); flex-shrink: 0; }
  .sug-info { flex: 1; min-width: 0; }
  .sug-title { font-size: .85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sug-artist { font-size: .75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .nav-back { color: var(--muted); font-size: .85rem; text-decoration: none; white-space: nowrap; margin-left: auto; }
  .nav-back:hover { color: var(--text); }

  /* ── MAIN SCROLL ── */
  #main { flex: 1; overflow-y: auto; padding-bottom: calc(var(--bar-h) + 8px); }
  #main::-webkit-scrollbar { width: 6px; }
  #main::-webkit-scrollbar-track { background: transparent; }
  #main::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  /* ── HERO ── */
  #hero { position: relative; height: 56vh; min-height: 300px; max-height: 480px; overflow: hidden; display: flex; align-items: flex-end; padding: 2.5rem; }
  #hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: background-image .5s; }
  #hero-bg::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(8,8,8,1) 0%, rgba(8,8,8,.6) 50%, rgba(8,8,8,.2) 100%); }
  #hero-content { position: relative; z-index: 2; display: flex; align-items: flex-end; gap: 1.5rem; }
  #hero-art { width: 120px; height: 120px; object-fit: cover; border-radius: 6px; box-shadow: 0 8px 32px rgba(0,0,0,.8); flex-shrink: 0; background: var(--surface3); }
  #hero-info { flex: 1; min-width: 0; }
  #hero-label { font-size: .72rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin-bottom: .3rem; }
  #hero-title { font-size: 2rem; font-weight: 800; line-height: 1.1; margin-bottom: .3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #hero-artist { font-size: .92rem; color: var(--muted); margin-bottom: .9rem; }
  .hero-actions { display: flex; gap: .6rem; }
  .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .5rem 1.2rem; border-radius: 999px; font-size: .88rem; font-weight: 700; border: none; cursor: pointer; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #1ed760; transform: scale(1.04); }
  .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--muted); }
  .btn-secondary:hover { border-color: var(--text); transform: scale(1.04); }
  .dots { display: flex; gap: .35rem; margin-top: .8rem; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.3); cursor: pointer; transition: all .2s; }
  .dot.active { background: var(--accent); transform: scale(1.3); }

  /* ── ROWS ── */
  #rows { padding: 1.5rem 0 2rem; }
  .row { margin-bottom: 2rem; }
  .row-label { font-size: 1rem; font-weight: 700; padding: 0 1.4rem; margin-bottom: .6rem; color: var(--text); }
  .row-wrap { position: relative; }
  .row-scroll { display: flex; gap: .9rem; overflow-x: auto; padding: 6px 1.4rem 16px; scrollbar-width: none; scroll-behavior: smooth; }
  .row-scroll::-webkit-scrollbar { display: none; }
  .row-arrow {
    position: absolute; top: 50%; transform: translateY(-60%);
    width: 34px; height: 68px; border: 1px solid rgba(255,255,255,.15); border-radius: 4px;
    background: rgba(18,18,18,.95); color: #fff; font-size: 1.5rem;
    cursor: pointer; z-index: 20; backdrop-filter: blur(6px);
    transition: background .2s, border-color .2s; display: flex; align-items: center; justify-content: center;
  }
  .row-arrow:hover { background: var(--accent); border-color: var(--accent); color: #000; }
  .row-left { left: 0; border-radius: 0 4px 4px 0; }
  .row-right { right: 0; border-radius: 4px 0 0 4px; }

  /* ── MUSIC CARD ── */
  .music-card { flex-shrink: 0; width: 148px; cursor: pointer; border-radius: var(--radius); padding: .75rem; background: var(--surface2); transition: background .2s; }
  .music-card:hover { background: var(--surface3); }
  .card-art-wrap { position: relative; width: 120px; height: 120px; margin: 0 auto .65rem; }
  .card-art { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; background: var(--surface3); display: block; box-shadow: 0 4px 16px rgba(0,0,0,.5); }
  .card-play-btn {
    position: absolute; bottom: 6px; right: 6px;
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent); color: #000; border: none; cursor: pointer;
    font-size: 1rem; display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: translateY(4px);
    transition: opacity .2s, transform .2s; box-shadow: 0 4px 12px rgba(0,0,0,.4);
  }
  .music-card:hover .card-play-btn { opacity: 1; transform: translateY(0); }
  .card-title { font-size: .8rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: .2rem; }
  .card-artist { font-size: .72rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
  .card-artist:hover { color: var(--text); text-decoration: underline; }
  .result-artist { font-size: .75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
  .result-artist:hover { color: var(--text); text-decoration: underline; }
  #bar-artist { font-size: .75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
  #bar-artist:hover { color: var(--text); text-decoration: underline; }
  /* Artist view */
  #artist-view { display: none; padding: 0 0 2rem; }
  #artist-view.open { display: block; }
  #artist-hero { background: linear-gradient(to bottom, var(--surface3), var(--bg)); padding: 2rem 1.4rem 1.2rem; display: flex; align-items: flex-end; gap: 1.2rem; margin-bottom: .5rem; }
  #artist-avatar { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; background: var(--surface3); flex-shrink: 0; box-shadow: 0 6px 24px rgba(0,0,0,.6); }
  #artist-name { font-size: 1.8rem; font-weight: 800; line-height: 1.1; }
  #artist-meta { font-size: .8rem; color: var(--muted); margin-top: .3rem; }
  #artist-play-all { margin-top: .8rem; }

  /* ── SEARCH RESULTS ── */
  #search-view { display: none; padding: 1.5rem 1.4rem; }
  #search-view.open { display: block; }
  #search-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
  .result-row { display: flex; align-items: center; gap: .75rem; padding: .5rem .7rem; border-radius: 6px; cursor: pointer; transition: background .15s; }
  .result-row:hover { background: var(--surface3); }
  .result-num { width: 20px; text-align: center; font-size: .85rem; color: var(--muted); flex-shrink: 0; }
  .result-art { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; background: var(--surface3); flex-shrink: 0; }
  .result-info { flex: 1; min-width: 0; }
  .result-title { font-size: .87rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-artist { font-size: .75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-dur { font-size: .78rem; color: var(--muted); flex-shrink: 0; }
  .now-playing-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: blink 1s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── BOTTOM PLAYER BAR ── */
  #player-bar {
    flex-shrink: 0; height: var(--bar-h); background: var(--surface2);
    border-top: 1px solid var(--border); display: flex; align-items: center;
    gap: .8rem; padding: 0 1rem; z-index: 200;
  }
  #bar-art { width: 56px; height: 56px; object-fit: cover; border-radius: 4px; background: var(--surface3); flex-shrink: 0; }
  #bar-info { flex: 0 0 200px; min-width: 0; }
  #bar-title { font-size: .85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  #bar-artist { font-size: .75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #controls { flex: 1; display: flex; flex-direction: column; align-items: center; gap: .35rem; min-width: 0; max-width: 600px; margin: 0 auto; }
  #ctrl-btns { display: flex; align-items: center; gap: .9rem; }
  .ctrl-btn { background: none; border: none; color: var(--muted); font-size: 1rem; cursor: pointer; padding: .2rem; border-radius: 50%; transition: color .15s, transform .1s; display: flex; align-items: center; }
  .ctrl-btn:hover { color: var(--text); }
  .ctrl-btn.active { color: var(--accent); }
  #play-pause { width: 36px; height: 36px; border-radius: 50%; background: var(--text); color: #000; border: none; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: transform .1s, background .15s; flex-shrink: 0; }
  #play-pause:hover { transform: scale(1.08); background: #fff; }
  #progress-wrap { width: 100%; display: flex; align-items: center; gap: .5rem; }
  #time-cur, #time-total { font-size: .7rem; color: var(--muted); flex-shrink: 0; min-width: 30px; text-align: center; }
  #progress-bar { flex: 1; height: 4px; background: var(--surface3); border-radius: 2px; cursor: pointer; position: relative; }
  #progress-fill { height: 100%; background: var(--muted); border-radius: 2px; width: 0%; transition: background .15s; pointer-events: none; }
  #progress-bar:hover #progress-fill { background: var(--accent); }
  #progress-thumb { position: absolute; top: 50%; right: 0; transform: translate(50%, -50%); width: 12px; height: 12px; border-radius: 50%; background: var(--text); display: none; pointer-events: none; }
  #progress-bar:hover #progress-thumb { display: block; }
  #volume-wrap { flex: 0 0 130px; display: flex; align-items: center; gap: .5rem; }
  #vol-icon { background: none; border: none; color: var(--muted); cursor: pointer; font-size: .9rem; flex-shrink: 0; }
  #vol-icon:hover { color: var(--text); }
  #volume-bar { flex: 1; height: 4px; background: var(--surface3); border-radius: 2px; cursor: pointer; position: relative; }
  #volume-fill { height: 100%; background: var(--muted); border-radius: 2px; width: 80%; pointer-events: none; }
  #volume-bar:hover #volume-fill { background: var(--accent); }

  /* ── BACK BUTTON / VIEW HEADER ── */
  .view-header { display: flex; align-items: center; gap: .8rem; padding: 1rem 1.4rem .4rem; }
  .back-btn {
    background: var(--surface3); border: none; color: var(--text);
    font-size: .85rem; font-weight: 600; padding: .4rem .9rem;
    border-radius: 999px; cursor: pointer; display: flex; align-items: center; gap: .35rem;
    transition: background .15s, transform .1s; flex-shrink: 0;
  }
  .back-btn:hover { background: var(--surface3); filter: brightness(1.3); transform: translateX(-2px); }
  .view-header h2 { font-size: 1.1rem; font-weight: 700; }

  /* ── LOADING / SKELETON ── */
  .skeleton { background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
  @keyframes shimmer { to { background-position: -200% 0; } }
  #bar-loading { font-size: .8rem; color: var(--muted); padding: .2rem 0; display: none; }
  #bar-loading.show { display: block; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    #bar-info { flex: 0 0 120px; }
    #volume-wrap { display: none; }
    #hero-content { flex-direction: column; align-items: flex-start; gap: .8rem; }
    #hero-art { width: 80px; height: 80px; }
    #hero-title { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/"><span>Numper</span> 🎵 Music</a>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search" type="text" placeholder="Search songs, artists…" autocomplete="off">
    <div id="suggestions"></div>
  </div>

</nav>

<!-- main scroll area -->
<div id="main">
  <!-- home view -->
  <div id="home-view">
    <div id="hero">
      <div id="hero-bg"></div>
      <div id="hero-content">
        <img id="hero-art" src="" alt="">
        <div id="hero-info">
          <div id="hero-label">🔥 Featured</div>
          <div id="hero-title">Loading…</div>
          <div id="hero-artist"></div>
          <div class="hero-actions">
            <button class="btn btn-primary" id="hero-play">▶ Play</button>
            <button class="btn btn-secondary" id="hero-queue">+ Queue</button>
          </div>
          <div class="dots" id="dots"></div>
        </div>
      </div>
    </div>
    <div id="rows"></div>
  </div>

  <!-- search view -->
  <div id="search-view">
    <div class="view-header">
      <button class="back-btn" onclick="showHome()">&#8592; Back</button>
      <h2 id="search-heading">Results</h2>
    </div>
    <div id="search-results"></div>
  </div>

  <!-- artist view -->
  <div id="artist-view">
    <div class="view-header">
      <button class="back-btn" id="artist-back">&#8592; Back</button>
    </div>
    <div id="artist-hero">
      <img id="artist-avatar" src="" alt="">
      <div>
        <div style="font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:.3rem;">Artist</div>
        <div id="artist-name">—</div>
        <div id="artist-meta"></div>
        <button class="btn btn-primary" id="artist-play-all" style="margin-top:.7rem;">▶ Play All</button>
      </div>
    </div>
    <div style="padding:0 1.4rem;">
      <h3 style="font-size:.95rem;font-weight:700;margin-bottom:.7rem;">Songs</h3>
      <div id="artist-tracks"></div>
    </div>
  </div>
</div>

<!-- bottom player bar -->
<div id="player-bar">
  <img id="bar-art" src="" alt="">
  <div id="bar-info">
    <div id="bar-title">—</div>
    <div id="bar-artist"></div>
    <div id="bar-loading">Loading…</div>
  </div>
  <div id="controls">
    <div id="ctrl-btns">
      <button class="ctrl-btn" id="btn-shuffle" title="Shuffle">⇌</button>
      <button class="ctrl-btn" id="btn-prev" title="Previous">⏮</button>
      <button id="play-pause" title="Play / Pause">▶</button>
      <button class="ctrl-btn" id="btn-next" title="Next">⏭</button>
      <button class="ctrl-btn" id="btn-repeat" title="Repeat">↻</button>
    </div>
    <div id="progress-wrap">
      <span id="time-cur">0:00</span>
      <div id="progress-bar">
        <div id="progress-fill"></div>
        <div id="progress-thumb"></div>
      </div>
      <span id="time-total">0:00</span>
    </div>
  </div>
  <div id="volume-wrap">
    <button id="vol-icon">🔊</button>
    <div id="volume-bar"><div id="volume-fill"></div></div>
  </div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const API = '';
let _trending = [], _heroIdx = 0, _heroTimer = null;
let _queue = [], _queueIdx = -1;
let _shuffle = false, _repeat = false;
let _loadingRecs = false;
const audio = document.getElementById('audio');

// ── Drag scroll ──────────────────────────────────────────────────────────────
function _addDragScroll(track) {
  let dragging = false, startX = 0, startScroll = 0;
  track.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragging = true; startX = e.pageX; startScroll = track.scrollLeft;
    track.style.scrollBehavior = 'auto'; track.style.cursor = 'grabbing'; track.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => { if (dragging) track.scrollLeft = startScroll - (e.pageX - startX); });
  document.addEventListener('mouseup', () => { if (!dragging) return; dragging = false; track.style.scrollBehavior = 'smooth'; track.style.cursor = 'grab'; track.style.userSelect = ''; });
  track.style.cursor = 'grab';
}

// ── Rows ─────────────────────────────────────────────────────────────────────
function renderRows(rows) {
  const container = document.getElementById('rows');
  container.innerHTML = '';
  rows.forEach(row => {
    if (!row.items.length) return;
    const div = document.createElement('div');
    div.className = 'row';
    div.innerHTML = `
      <div class="row-label">${row.label}</div>
      <div class="row-wrap">
        <button class="row-arrow row-left" data-dir="-1">&#8249;</button>
        <div class="row-scroll"></div>
        <button class="row-arrow row-right" data-dir="1">&#8250;</button>
      </div>`;
    const scroll = div.querySelector('.row-scroll');
    row.items.forEach(item => scroll.appendChild(makeCard(item)));
    div.querySelectorAll('.row-arrow').forEach(btn => {
      btn.addEventListener('click', () => scroll.scrollBy({ left: parseInt(btn.dataset.dir) * scroll.clientWidth * 0.85, behavior: 'smooth' }));
    });
    _addDragScroll(scroll);
    container.appendChild(div);
  });
}

// makeCard — clicking art/title starts a radio; clicking artist name opens artist view
function makeCard(item) {
  const div = document.createElement('div');
  div.className = 'music-card';
  div.innerHTML = `
    <div class="card-art-wrap">
      <img class="card-art skeleton" src="${item.thumb || ''}" alt="" loading="lazy">
      <button class="card-play-btn">▶</button>
    </div>
    <div class="card-title">${item.title}</div>
    <div class="card-artist">${item.artist || ''}</div>`;
  div.querySelector('img').onload = e => e.target.classList.remove('skeleton');
  // Art + play button → radio
  div.querySelector('.card-art-wrap').addEventListener('click', () => playRadio(item));
  div.querySelector('.card-play-btn').addEventListener('click', e => { e.stopPropagation(); playRadio(item); });
  div.querySelector('.card-title').addEventListener('click', () => playRadio(item));
  // Artist name → artist page
  const artistEl = div.querySelector('.card-artist');
  if (item.artist) artistEl.addEventListener('click', e => { e.stopPropagation(); openArtist(item.artist, item.thumb); });
  return div;
}

// ── Hero ─────────────────────────────────────────────────────────────────────
function renderHero() {
  if (!_trending.length) return;
  const item = _trending[_heroIdx];
  document.getElementById('hero-bg').style.backgroundImage = `url('${item.thumb}')`;
  document.getElementById('hero-art').src = item.thumb || '';
  document.getElementById('hero-title').textContent = item.title;
  document.getElementById('hero-artist').textContent = item.artist || '';
  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  _trending.slice(0, 8).forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === _heroIdx ? ' active' : '');
    d.onclick = () => { _heroIdx = i; renderHero(); resetHeroTimer(); };
    dots.appendChild(d);
  });
  clearInterval(_heroTimer);
  _heroTimer = setInterval(() => { _heroIdx = (_heroIdx + 1) % Math.min(_trending.length, 8); renderHero(); }, 7000);
}
function resetHeroTimer() {
  clearInterval(_heroTimer);
  _heroTimer = setInterval(() => { _heroIdx = (_heroIdx + 1) % Math.min(_trending.length, 8); renderHero(); }, 7000);
}
// Hero play → radio from that song; hero artist → artist page
document.getElementById('hero-play').onclick = () => { if (_trending[_heroIdx]) playRadio(_trending[_heroIdx]); };
document.getElementById('hero-queue').onclick = () => { if (_trending[_heroIdx]) addToQueue(_trending[_heroIdx]); };
document.getElementById('hero-artist').style.cursor = 'pointer';
document.getElementById('hero-artist').onclick = () => { const item = _trending[_heroIdx]; if (item?.artist) openArtist(item.artist, item.thumb); };

// ── Search ───────────────────────────────────────────────────────────────────
let _searchTimer = null, _lastQuery = '';
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(_searchTimer);
  const q = e.target.value.trim();
  if (!q) { hideSug(); showHome(); return; }
  _searchTimer = setTimeout(() => fetchSug(q), 280);
});
document.getElementById('search').addEventListener('keydown', e => {
  if (e.key === 'Escape') { hideSug(); document.getElementById('search').value = ''; showHome(); }
  if (e.key === 'Enter') { const q = e.target.value.trim(); if (q) { hideSug(); fullSearch(q); } }
});
document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) hideSug(); });

async function fetchSug(q) {
  try {
    const res = await fetch(`${API}/api/music/suggest?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    const box = document.getElementById('suggestions');
    if (!data.results?.length) { box.style.display = 'none'; return; }
    box.innerHTML = data.results.map((r, i) => `
      <div class="sug-item" data-i="${i}">
        <img class="sug-thumb" src="${r.thumb || ''}" alt="" loading="lazy">
        <div class="sug-info"><div class="sug-title">${r.title}</div><div class="sug-artist">${r.artist || ''}</div></div>
      </div>`).join('');
    box._results = data.results;
    box.querySelectorAll('.sug-item').forEach(el => {
      el.onclick = () => {
        hideSug();
        const picked = box._results[+el.dataset.i];
        // Full search for the picked song's title so the queue has context
        document.getElementById('search').value = picked.title;
        fullSearch(picked.title, picked.id);
      };
    });
    box.style.display = 'block';
  } catch(e) {}
}
function hideSug() { document.getElementById('suggestions').style.display = 'none'; }

// fullSearch: q = query, autoPlayId = song id to auto-play from results
async function fullSearch(q, autoPlayId) {
  _lastQuery = q;
  document.getElementById('home-view').style.display = 'none';
  const sv = document.getElementById('search-view');
  sv.classList.add('open');
  document.getElementById('search-heading').textContent = `Results for "${q}"`;
  const grid = document.getElementById('search-results');
  grid.innerHTML = '<div style="color:var(--muted);padding:20px">Searching…</div>';

  // Remove old recs section if any
  const oldRecs = document.getElementById('recs-section');
  if (oldRecs) oldRecs.remove();

  try {
    const res = await fetch(`${API}/api/music/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    const results = data.results || [];
    if (!results.length) { grid.innerHTML = '<div style="color:var(--muted);padding:20px">No results found.</div>'; return; }
    grid.innerHTML = '';
    results.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'result-row';
      row.dataset.idx = i;
      row.innerHTML = `
        <div class="result-num">${i + 1}</div>
        <img class="result-art" src="${item.thumb || ''}" alt="" loading="lazy">
        <div class="result-info">
          <div class="result-title">${item.title}</div>
          <div class="result-artist">${item.artist || ''}</div>
        </div>
        <div class="result-dur">${fmtTime(item.duration)}</div>`;
      // Row click → queue all results from this index
      row.addEventListener('click', () => { playFromList(results, i); highlightResult(i); });
      // Artist name click → artist page
      if (item.artist) {
        row.querySelector('.result-artist').addEventListener('click', e => {
          e.stopPropagation();
          openArtist(item.artist, item.thumb);
        });
      }
      grid.appendChild(row);
    });

    // If called from a suggestion, auto-play that song
    if (autoPlayId) {
      const idx = results.findIndex(r => r.id === autoPlayId);
      const startIdx = idx >= 0 ? idx : 0;
      playFromList(results, startIdx);
      highlightResult(startIdx);
    }

    // Load "More like this" recommendations below results
    loadRecsSection(results[0]);
  } catch(e) {
    grid.innerHTML = '<div style="color:var(--muted);padding:20px">Search failed. Try again.</div>';
  }
}

// Renders a "More like this" row below search results
async function loadRecsSection(seedItem) {
  if (!seedItem) return;
  const sv = document.getElementById('search-view');
  const section = document.createElement('div');
  section.id = 'recs-section';
  section.style.cssText = 'margin-top:2rem;';
  section.innerHTML = `<h3 style="font-size:.95rem;font-weight:700;margin-bottom:.8rem;padding:0 .2rem;">More like this</h3><div id="recs-grid" style="color:var(--muted);font-size:.85rem;padding:.4rem .2rem;">Loading…</div>`;
  sv.appendChild(section);

  try {
    // Search by artist name for related songs
    const artistQ = seedItem.artist ? seedItem.artist.split(',')[0].trim() : seedItem.title;
    const res = await fetch(`${API}/api/music/search?q=${encodeURIComponent(artistQ)}`);
    const data = await res.json();
    const recs = (data.results || []).filter(r => r.id !== seedItem.id).slice(0, 20);
    const grid = document.getElementById('recs-grid');
    if (!recs.length) { grid.textContent = 'No recommendations found.'; return; }
    grid.innerHTML = '';
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;';
    recs.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'result-row';
      row.innerHTML = `
        <div class="result-num">${i + 1}</div>
        <img class="result-art" src="${item.thumb || ''}" alt="" loading="lazy">
        <div class="result-info">
          <div class="result-title">${item.title}</div>
          <div class="result-artist">${item.artist || ''}</div>
        </div>
        <div class="result-dur">${fmtTime(item.duration)}</div>`;
      row.addEventListener('click', () => playFromList(recs, i));
      grid.appendChild(row);
    });
  } catch(e) {
    const g = document.getElementById('recs-grid');
    if (g) g.textContent = '';
  }
}

function highlightResult(idx) {
  document.querySelectorAll('#search-results .result-row').forEach((r, i) => {
    const numEl = r.querySelector('.result-num');
    if (i === idx) numEl.innerHTML = '<div class="now-playing-dot"></div>';
    else numEl.textContent = i + 1;
  });
}

function showHome() {
  document.getElementById('home-view').style.display = '';
  document.getElementById('search-view').classList.remove('open');
  document.getElementById('artist-view').classList.remove('open');
  document.getElementById('search').value = '';
  _lastQuery = '';
}

// ── Artist page ───────────────────────────────────────────────────────────────
async function openArtist(artistName, seedThumb) {
  const name = artistName.split(',')[0].trim();
  // Remember what was open before so back button can return there
  const wasSearch = document.getElementById('search-view').classList.contains('open');
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('search-view').classList.remove('open');
  const av = document.getElementById('artist-view');
  av.classList.add('open');
  // Back → previous view (search or home)
  document.getElementById('artist-back').onclick = wasSearch
    ? () => { av.classList.remove('open'); document.getElementById('search-view').classList.add('open'); }
    : () => showHome();
  // Header
  document.getElementById('artist-name').textContent = name;
  document.getElementById('artist-avatar').src = seedThumb || '';
  document.getElementById('artist-meta').textContent = 'Loading…';
  document.getElementById('artist-tracks').innerHTML = '<div style="color:var(--muted);padding:1rem 0">Loading…</div>';

  try {
    const res = await fetch(`${API}/api/music/search?q=${encodeURIComponent(name)}`);
    const data = await res.json();
    const tracks = data.results || [];
    document.getElementById('artist-meta').textContent = `${tracks.length} songs found`;
    // Use first result's thumb if no seedThumb
    if (!seedThumb && tracks[0]?.thumb) document.getElementById('artist-avatar').src = tracks[0].thumb;

    const container = document.getElementById('artist-tracks');
    container.innerHTML = '';
    tracks.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'result-row';
      row.innerHTML = `
        <div class="result-num">${i + 1}</div>
        <img class="result-art" src="${item.thumb || ''}" alt="" loading="lazy">
        <div class="result-info">
          <div class="result-title">${item.title}</div>
          <div class="result-artist">${item.artist || ''}</div>
        </div>
        <div class="result-dur">${fmtTime(item.duration)}</div>`;
      row.addEventListener('click', () => { playFromList(tracks, i); highlightArtistTrack(i); });
      container.appendChild(row);
    });

    // Play All → start radio from first track
    document.getElementById('artist-play-all').onclick = () => { if (tracks.length) playFromList(tracks, 0); };
  } catch(e) {
    document.getElementById('artist-tracks').innerHTML = '<div style="color:var(--muted);padding:1rem 0">Failed to load. Try again.</div>';
  }
}

function highlightArtistTrack(idx) {
  document.querySelectorAll('#artist-tracks .result-row').forEach((r, i) => {
    const numEl = r.querySelector('.result-num');
    if (i === idx) numEl.innerHTML = '<div class="now-playing-dot"></div>';
    else numEl.textContent = i + 1;
  });
}

// ── Playback ──────────────────────────────────────────────────────────────────

// Radio mode: play song + build artist-based queue in background (like Spotify song radio)
async function playRadio(item) {
  _queue = [item];
  _queueIdx = 0;
  loadAndPlay(item);
  appendRecommended(item);
}

// Play from a list (search results / artist page) — Next/Prev navigates the list
function playFromList(items, idx) {
  _queue = [...items];
  _queueIdx = idx;
  loadAndPlay(_queue[_queueIdx]);
}

function addToQueue(item) {
  _queue.push(item);
  if (_queueIdx === -1) { _queueIdx = 0; loadAndPlay(_queue[0]); }
}

// Fetch more songs by same artist and append to queue (background)
async function appendRecommended(seedItem) {
  if (_loadingRecs) return;
  _loadingRecs = true;
  try {
    const artistQ = seedItem.artist ? seedItem.artist.split(',')[0].trim() : seedItem.title;
    const res = await fetch(`${API}/api/music/search?q=${encodeURIComponent(artistQ)}`);
    const data = await res.json();
    const existingIds = new Set(_queue.map(s => s.id));
    const recs = (data.results || []).filter(r => !existingIds.has(r.id));
    _queue.push(...recs);
  } catch(e) {}
  _loadingRecs = false;
}

async function loadAndPlay(item) {
  document.getElementById('bar-art').src = item.thumb || '';
  document.getElementById('bar-title').textContent = item.title;
  const barArtist = document.getElementById('bar-artist');
  barArtist.textContent = item.artist || '';
  barArtist.onclick = item.artist ? () => openArtist(item.artist, item.thumb) : null;
  document.getElementById('bar-loading').classList.add('show');
  document.getElementById('play-pause').textContent = '⏸';

  let url = item.url;
  if (!url) {
    try {
      const res = await fetch(`${API}/api/music/song?id=${encodeURIComponent(item.id)}`);
      if (!res.ok) throw new Error('not found');
      const d = await res.json();
      url = d.url;
      if (d.thumb) document.getElementById('bar-art').src = d.thumb;
      if (d.artist) document.getElementById('bar-artist').textContent = d.artist;
    } catch(e) {
      document.getElementById('bar-loading').classList.remove('show');
      document.getElementById('bar-title').textContent = 'Stream not available';
      document.getElementById('play-pause').textContent = '▶';
      return;
    }
  }

  audio.src = url;
  audio.load();
  audio.play().then(() => {
    document.getElementById('bar-loading').classList.remove('show');
    document.getElementById('play-pause').textContent = '⏸';
  }).catch(() => {
    document.getElementById('bar-loading').classList.remove('show');
    document.getElementById('bar-title').textContent = 'Playback blocked — click play';
    document.getElementById('play-pause').textContent = '▶';
  });
}

// ── Audio events ──────────────────────────────────────────────────────────────
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-thumb').style.left = pct + '%';
  document.getElementById('time-cur').textContent = fmtTime(Math.floor(audio.currentTime));
});
audio.addEventListener('loadedmetadata', () => {
  document.getElementById('time-total').textContent = fmtTime(Math.floor(audio.duration));
});
audio.addEventListener('ended', () => {
  if (_repeat) { audio.currentTime = 0; audio.play(); return; }
  const next = _shuffle
    ? Math.floor(Math.random() * _queue.length)
    : _queueIdx + 1;
  if (next < _queue.length) {
    _queueIdx = next;
    loadAndPlay(_queue[_queueIdx]);
    // highlight if still in search view
    if (document.getElementById('search-view').classList.contains('open')) highlightResult(_queueIdx);
  } else {
    // Queue exhausted — fetch more recommendations from current song
    const current = _queue[_queueIdx];
    if (current) appendRecommended(current).then(() => {
      if (_queue.length > _queueIdx + 1) { _queueIdx++; loadAndPlay(_queue[_queueIdx]); }
      else document.getElementById('play-pause').textContent = '▶';
    });
    else document.getElementById('play-pause').textContent = '▶';
  }
});
audio.addEventListener('waiting', () => { document.getElementById('bar-loading').classList.add('show'); });
audio.addEventListener('playing', () => { document.getElementById('bar-loading').classList.remove('show'); });

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById('play-pause').addEventListener('click', () => {
  if (audio.paused) { audio.play(); document.getElementById('play-pause').textContent = '⏸'; }
  else { audio.pause(); document.getElementById('play-pause').textContent = '▶'; }
});
document.getElementById('btn-prev').addEventListener('click', () => {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  if (_queueIdx > 0) { _queueIdx--; loadAndPlay(_queue[_queueIdx]); }
});
document.getElementById('btn-next').addEventListener('click', () => {
  const next = _shuffle ? Math.floor(Math.random() * _queue.length) : _queueIdx + 1;
  if (next < _queue.length) { _queueIdx = next; loadAndPlay(_queue[_queueIdx]); }
});
document.getElementById('btn-shuffle').addEventListener('click', () => {
  _shuffle = !_shuffle;
  document.getElementById('btn-shuffle').classList.toggle('active', _shuffle);
});
document.getElementById('btn-repeat').addEventListener('click', () => {
  _repeat = !_repeat;
  document.getElementById('btn-repeat').classList.toggle('active', _repeat);
});

// progress seek
document.getElementById('progress-bar').addEventListener('click', e => {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  if (audio.duration) audio.currentTime = pct * audio.duration;
});

// volume
let _vol = 0.8;
audio.volume = _vol;
function updateVolFill() {
  document.getElementById('volume-fill').style.width = (_vol * 100) + '%';
  document.getElementById('vol-icon').textContent = _vol === 0 ? '🔇' : _vol < 0.5 ? '🔉' : '🔊';
}
updateVolFill();
document.getElementById('volume-bar').addEventListener('click', e => {
  const rect = e.currentTarget.getBoundingClientRect();
  _vol = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.volume = _vol;
  updateVolFill();
});
document.getElementById('vol-icon').addEventListener('click', () => {
  _vol = _vol > 0 ? 0 : 0.8;
  audio.volume = _vol;
  updateVolFill();
});

// keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); document.getElementById('play-pause').click(); }
  if (e.code === 'ArrowRight') audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10);
  if (e.code === 'ArrowLeft') audio.currentTime = Math.max(0, audio.currentTime - 10);
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function loadHome() {
  const res = await fetch(`${API}/api/music/home`);
  const data = await res.json();
  _trending = data.trending || [];
  renderHero();
  renderRows(data.rows || []);
}
loadHome();
</script>
